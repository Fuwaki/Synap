name: Desktop Linux

on:
  push:
    branches:
      - master
    tags:
      - 'desktop-linux-*'
    paths:
      - 'desktop_linux/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop_linux.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'desktop_linux/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop_linux.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Desktop Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            pkg-config

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build desktop app
        run: cargo build --locked --package synap-desktop-linux --bin synap-desktop-linux ${{ startsWith(github.ref, 'refs/tags/') && '--release' || '' }}

      - name: Collect release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          mkdir -p dist

          bundle_dir="dist/synap-desktop-linux-${GITHUB_REF_NAME}-linux-x64"
          mkdir -p "$bundle_dir"
          cp "target/release/synap-desktop-linux" "$bundle_dir/"

          if [ -f README.md ]; then
            cp README.md "$bundle_dir/"
          fi

          tar -czf "${bundle_dir}.tar.gz" -C dist "$(basename "$bundle_dir")"

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: synap-desktop-linux-release
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: synap-desktop-linux-release
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
